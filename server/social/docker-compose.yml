version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: social_postgres
    environment:
      POSTGRES_DB: social_users
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - social_network

  # MongoDB для сообщений и новостей
  mongodb:
    image: mongo:7-jammy
    container_name: social_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpass
      MONGO_INITDB_DATABASE: social_messages
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: unless-stopped
    networks:
      - social_network

  # MongoDB Express
  mongo-express:
    image: mongo-express:latest
    container_name: social_mongo_express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: adminpass
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      - mongodb
    networks:
      - social_network

volumes:
  postgres_data:
    name: social_postgres_data
  mongodb_data:
    name: social_mongodb_data
  mongodb_config:
    name: social_mongodb_config

networks:
  social_network:
    name: social_network
    driver: bridge