<div class="chat-container">
  <div class="chat-header mat-elevation-z4">
    <h2>Чат с пользователем {{ friendName || '...' }}</h2>
    <button mat-stroked-button color="warn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
      Назад
    </button>
  </div>

  <mat-card class="messages">
    <div
      *ngFor="let msg of messages"
      class="message"
      [class.self]="isOwnMessage(msg)"
    >
      <mat-card class="message-bubble" [ngClass]="{ self: isOwnMessage(msg) }">
        <b>{{ isOwnMessage(msg) ? 'Вы' : friendName }}:</b>
        <div class="message-text">{{ msg.text }}</div>

        <!-- Кнопка удаления только для своих сообщений -->
        <button
          *ngIf="isOwnMessage(msg)"
          mat-icon-button
          color="warn"
          (click)="deleteMessage(msg)"
          title="Удалить сообщение"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card>
    </div>
  </mat-card>

  <form [formGroup]="chatForm" (ngSubmit)="sendMessage()" class="chat-form">
    <mat-form-field appearance="fill" class="flex-grow">
      <mat-label>Введите сообщение...</mat-label>
      <input matInput formControlName="message" required />
      <mat-error *ngIf="chatForm.get('message')?.hasError('required')">
        Сообщение не может быть пустым
      </mat-error>
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit" [disabled]="chatForm.invalid">
      <mat-icon>send</mat-icon>
      Отправить
    </button>
  </form>
</div>
